<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声テスト</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #1a3528; color: #f5f0e8; }
button { margin: 10px; padding: 16px 24px; font-size: 16px; border-radius: 8px; border: none; background: #b8892e; color: white; cursor: pointer; display: block; width: 100%; }
#log { background: #0a1a10; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>🔊 音声テスト</h2>

<button onclick="testBasic()">① 基本テスト（日本語）</button>
<button onclick="testEN()">② 英語テスト</button>
<button onclick="testZH()">③ 中国語テスト</button>
<button onclick="listVoices()">④ 利用可能な音声一覧</button>
<button onclick="testSpeechSynthesis()">⑤ 環境チェック</button>

<div id="log">ログがここに表示されます</div>

<script>
var log = document.getElementById('log');
function addLog(msg) { log.textContent += '\n' + msg; }

function testBasic() {
  addLog('--- 日本語テスト開始 ---');
  if (!window.speechSynthesis) { addLog('❌ speechSynthesis 未対応'); return; }
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('只今、係りの者が参りますので、少々お待ちください。');
  u.lang = 'ja-JP';
  u.rate = 0.88;
  u.volume = 1.0;
  u.onstart   = function(){ addLog('✅ 再生開始'); };
  u.onend     = function(){ addLog('✅ 再生完了'); };
  u.onerror   = function(e){ addLog('❌ エラー: ' + e.error); };
  addLog('speak() 呼び出し中...');
  window.speechSynthesis.speak(u);
  addLog('speak() 呼び出し後: paused=' + window.speechSynthesis.paused + ' pending=' + window.speechSynthesis.pending + ' speaking=' + window.speechSynthesis.speaking);
}

function testEN() {
  addLog('--- 英語テスト開始 ---');
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('A staff member will be with you shortly. Please wait.');
  u.lang = 'en-US';
  u.onstart = function(){ addLog('✅ EN 再生開始'); };
  u.onend   = function(){ addLog('✅ EN 再生完了'); };
  u.onerror = function(e){ addLog('❌ EN エラー: ' + e.error); };
  window.speechSynthesis.speak(u);
}

function testZH() {
  addLog('--- 中国語テスト開始 ---');
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance('工作人员即将前来接待，请稍候。');
  u.lang = 'zh-CN';
  u.onstart = function(){ addLog('✅ ZH 再生開始'); };
  u.onend   = function(){ addLog('✅ ZH 再生完了'); };
  u.onerror = function(e){ addLog('❌ ZH エラー: ' + e.error); };
  window.speechSynthesis.speak(u);
}

function listVoices() {
  var voices = window.speechSynthesis.getVoices();
  addLog('--- 音声一覧 (計' + voices.length + '件) ---');
  voices.forEach(function(v, i) {
    addLog(i + ': ' + v.name + ' / ' + v.lang + (v.default ? ' [default]' : ''));
  });
  if (voices.length === 0) addLog('⚠ 音声が0件 → まだロード中か未対応');
}

function testSpeechSynthesis() {
  addLog('--- 環境チェック ---');
  addLog('speechSynthesis: ' + (window.speechSynthesis ? '✅ 対応' : '❌ 未対応'));
  addLog('SpeechSynthesisUtterance: ' + (window.SpeechSynthesisUtterance ? '✅ 対応' : '❌ 未対応'));
  addLog('UA: ' + navigator.userAgent.substring(0, 80));
  if (window.speechSynthesis) {
    addLog('paused: ' + window.speechSynthesis.paused);
    addLog('speaking: ' + window.speechSynthesis.speaking);
    addLog('pending: ' + window.speechSynthesis.pending);
  }
}

/* 音声リスト自動ロード */
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = function() {
    addLog('✅ onvoiceschanged: ' + window.speechSynthesis.getVoices().length + '件ロード完了');
  };
}
</script>
</body>
</html>
