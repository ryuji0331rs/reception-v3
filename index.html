<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>受付システム V3 – 2nd Village / LUX TOKYO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:       #f0ece3;
  --surface:  #ffffff;
  --border:   #d0c8b8;
  --gold:     #b8892e;
  --gold-dim: #8a6820;
  --text:     #1a3528;
  --text-sub: #5a7a68;
  --red:      #c0392b;
  --f-sys:    Georgia, "Times New Roman", serif;
  --f-serif:  "Noto Serif JP", Georgia, serif;
  --f-body:   "Noto Sans JP", "Hiragino Sans", sans-serif;
  --radius:   20px;
  --tr:       0.2s cubic-bezier(0.4,0,0.2,1);
}
html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--f-body); overflow:hidden; -webkit-tap-highlight-color:transparent; }

/* SCREENS */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity var(--tr); padding:28px 36px; }
.screen.active { opacity:1; pointer-events:all; }

/* IDLE */
#s-idle { background:linear-gradient(160deg,#183022 0%,#1f3d2c 55%,#234838 100%); cursor:pointer; }
.idle-lang { position:absolute; top:28px; right:36px; display:flex; gap:8px; }
.ilbtn { background:rgba(255,255,255,0.08); border:1px solid rgba(201,168,76,0.35); border-radius:99px; color:rgba(245,240,232,0.6); font-family:var(--f-body); font-size:12px; letter-spacing:0.08em; padding:6px 16px; cursor:pointer; transition:all var(--tr); }
.ilbtn.active { background:rgba(201,168,76,0.15); border-color:#c9a84c; color:#c9a84c; }
.idle-logos { display:flex; align-items:center; gap:32px; margin-bottom:8px; }
.idle-logos img { object-fit:contain; }
.idle-sep { color:rgba(201,168,76,0.5); font-family:var(--f-sys); font-size:clamp(20px,2.5vw,32px); font-weight:300; }
.idle-sub { font-family:var(--f-body); font-size:clamp(10px,1.1vw,12px); letter-spacing:0.5em; color:rgba(201,168,76,0.45); margin-bottom:48px; text-transform:uppercase; }
#clock { font-family:var(--f-sys); font-size:clamp(80px,13vw,150px); font-weight:400; letter-spacing:0.06em; color:rgba(245,240,232,0.80); line-height:1; margin-bottom:10px; }
#date { font-family:var(--f-body); font-size:clamp(12px,1.4vw,16px); color:rgba(201,168,76,0.60); letter-spacing:0.18em; margin-bottom:60px; }
.tap-hint { font-family:var(--f-body); font-size:clamp(11px,1.2vw,13px); color:rgba(201,168,76,0.40); letter-spacing:0.25em; animation:pulse 2.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.85} }

/* HEADER */
.hbar { display:flex; align-items:center; justify-content:space-between; width:100%; max-width:720px; padding-bottom:32px; }
.hlogo { font-family:var(--f-sys); font-size:clamp(13px,1.4vw,16px); letter-spacing:0.4em; color:var(--gold); text-transform:uppercase; }
.lsw { display:flex; gap:8px; }
.lbtn { background:none; border:1px solid var(--border); color:var(--text-sub); font-family:var(--f-body); font-size:12px; letter-spacing:0.08em; padding:6px 14px; border-radius:99px; cursor:pointer; transition:all var(--tr); }
.lbtn.active { border-color:var(--gold); color:var(--gold); }

/* BACK */
.back { position:absolute; top:26px; left:32px; background:none; border:1px solid var(--border); border-radius:99px; color:var(--text-sub); font-family:var(--f-body); font-size:13px; padding:7px 18px; cursor:pointer; transition:all var(--tr); }
.back:hover { border-color:var(--gold-dim); color:var(--text); }

/* PAGE TITLE */
.ptitle { font-family:var(--f-serif); font-size:clamp(18px,2.6vw,32px); font-weight:400; letter-spacing:0.08em; color:var(--text); text-align:center; margin-bottom:36px; }

/* COMPANY CARDS */
#s-company { gap:0; }
.ccards { display:flex; gap:28px; flex-wrap:wrap; justify-content:center; }
.ccard { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:clamp(200px,26vw,300px); padding:40px 24px 32px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; cursor:pointer; transition:all var(--tr); box-shadow:0 2px 16px rgba(26,53,40,0.05); user-select:none; min-height:260px; }
.ccard:active { transform:scale(0.97); opacity:0.85; }
.ccard:hover { border-color:var(--gold); box-shadow:0 8px 28px rgba(26,53,40,0.10); transform:translateY(-4px); }
.ccard img { max-width:180px; max-height:130px; object-fit:contain; pointer-events:none; }
.lux-card { border-color:rgba(184,137,46,0.35); }

/* PURPOSE GRID */
#s-purpose { gap:0; }
.pgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; width:100%; max-width:680px; }
.pbtn { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px 16px 24px; display:flex; flex-direction:column; align-items:center; gap:16px; cursor:pointer; transition:all var(--tr); box-shadow:0 2px 12px rgba(26,53,40,0.04); user-select:none; }
.pbtn:active { transform:scale(0.97); opacity:0.85; }
.pbtn:hover { border-color:var(--gold); box-shadow:0 6px 22px rgba(26,53,40,0.09); transform:translateY(-3px); }
.pbtn img { width:clamp(80px,11vw,130px); height:clamp(80px,11vw,130px); object-fit:contain; pointer-events:none; }
.plabel { font-family:var(--f-serif); font-size:clamp(15px,1.8vw,20px); font-weight:400; color:var(--text); text-align:center; letter-spacing:0.1em; }

/* WAIT */
#s-wait { gap:20px; }
.wicon img { width:clamp(80px,11vw,130px); pointer-events:none; }
.wcompany { font-family:var(--f-sys); font-size:clamp(14px,2vw,24px); font-weight:400; color:var(--gold); letter-spacing:0.25em; text-align:center; }
.wbadge { background:var(--surface); border:1px solid var(--border); border-radius:99px; padding:6px 20px; font-family:var(--f-serif); font-size:clamp(12px,1.4vw,15px); color:var(--text-sub); letter-spacing:0.1em; }
.wmsg { font-family:var(--f-serif); font-size:clamp(17px,2.4vw,28px); font-weight:400; color:var(--text); text-align:center; line-height:2; letter-spacing:0.06em; }
.wprog { width:180px; height:2px; background:var(--border); border-radius:99px; overflow:hidden; }
.wbar { height:100%; background:var(--gold); width:0; }
.wskip { background:none; border:1px solid var(--border); border-radius:99px; color:var(--text-sub); font-family:var(--f-body); font-size:12px; letter-spacing:0.1em; padding:7px 22px; cursor:pointer; transition:all var(--tr); }
.wskip:hover { border-color:var(--text-sub); color:var(--text); }

/* TOAST */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--red); color:#fff; padding:10px 24px; border-radius:99px; font-family:var(--f-body); font-size:13px; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:999; white-space:nowrap; }
#toast.show { opacity:1; }

/* ADMIN */
#admin-modal { position:fixed; inset:0; background:rgba(10,20,15,0.88); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:998; }
#admin-modal.open { opacity:1; pointer-events:all; }
.abox { background:#1a3528; border:1px solid #2d5040; border-radius:var(--radius); padding:32px; min-width:320px; display:flex; flex-direction:column; gap:14px; }
.abox h2 { font-family:var(--f-sys); color:var(--gold); font-size:18px; letter-spacing:0.15em; font-weight:400; }
.alabel { font-family:var(--f-body); color:#7a9e8a; font-size:11px; display:block; margin-bottom:5px; letter-spacing:0.08em; }
.ainput { width:100%; background:#1f3d2e; border:1px solid #2d5040; border-radius:8px; color:#f5f0e8; font-family:var(--f-body); font-size:13px; padding:9px 12px; outline:none; }
.ainput:focus { border-color:var(--gold); }
.abtns { display:flex; gap:10px; margin-top:4px; }
.asave { flex:1; background:var(--gold); border:none; border-radius:8px; color:#fff; font-family:var(--f-body); font-size:13px; font-weight:500; padding:11px; cursor:pointer; }
.acancel { flex:1; background:none; border:1px solid #2d5040; border-radius:8px; color:#7a9e8a; font-family:var(--f-body); font-size:13px; padding:11px; cursor:pointer; }
.alog { background:#152b20; border-radius:8px; padding:12px; max-height:130px; overflow-y:auto; font-family:var(--f-body); font-size:11px; color:#7a9e8a; line-height:1.7; }
</style>
</head>

  <div class="wcompany" id="w-company"></div>
  <div class="wbadge" id="w-badge" style="display:none"></div>
  <div class="wmsg" data-i18n="wait_msg">係りの者が参りますので<br>少々お待ちください。</div>
  <div class="wprog"><div class="wbar" id="w-bar"></div></div>
  <button class="wskip" data-action="go-home" data-i18n="wait_skip">画面をタップしてトップに戻る</button>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ADMIN -->
<div id="admin-modal">
  <div class="abox">
    <h2>⚙ 管理設定</h2>
    <div>
      <label class="alabel">Webhook URL（株式会社 2nd Village）</label>
      <input class="ainput" id="wh-2nd" type="text" placeholder="https://chat.googleapis.com/v1/spaces/...">
    </div>
    <div>
      <label class="alabel">Webhook URL（LUX TOKYO）</label>
      <input class="ainput" id="wh-lux" type="text" placeholder="https://chat.googleapis.com/v1/spaces/...">
    </div>
    <div class="abtns">
      <button class="asave" data-action="admin-save">保存</button>
      <button class="acancel" data-action="admin-close">閉じる</button>
    </div>
    <div class="alog" id="alog">— 送信ログ —</div>
  </div>
</div>

<script>
(function(){
"use strict";

/* ── STATE ── */
var s = { company:"", purpose:{ja:"",en:"",zh:""} };
var screen     = "idle";
var lang       = "ja";
var idleTimer  = null;
var waitTimer  = null;
var aTaps      = 0;
var aTapTimer  = null;
var IDLE_MS    = 60000;
var WAIT_MS    = 30000;

/* ── I18N ── */
var T = {
  ja:{ tap:"画面をタップして受付を開始", select_dest:"受付先をお選びください", select_purpose:"ご用件をお選びください", p_interview:"面接", p_meeting:"打ち合わせ", p_delivery:"配達・集荷", p_other:"その他", wait_msg:"係りの者が参りますので<br>少々お待ちください。", wait_skip:"画面をタップしてトップに戻る", back:"戻る", net_err:"⚠ ネットワーク接続を確認してください" },
  en:{ tap:"Tap to start check-in", select_dest:"Please select your destination", select_purpose:"Please select your purpose", p_interview:"Interview", p_meeting:"Meeting", p_delivery:"Delivery / Pickup", p_other:"Other", wait_msg:"A staff member will be with you shortly.<br>Please wait.", wait_skip:"Tap to return to top", back:"Back", net_err:"⚠ Please check your network connection" },
  zh:{ tap:"点击屏幕开始登记", select_dest:"请选择接待方", select_purpose:"请选择您的来访目的", p_interview:"面试", p_meeting:"商务会谈", p_delivery:"快递·取件", p_other:"其他", wait_msg:"工作人员即将前来接待，<br>请稍候。", wait_skip:"点击屏幕返回首页", back:"返回", net_err:"⚠ 请检查网络连接" }
};
function tr(k){ return (T[lang]&&T[lang][k]) || T.ja[k] || k; }

function applyLang(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){ el.innerHTML = tr(el.dataset.i18n); });
  document.querySelectorAll("[data-lang]").forEach(function(b){ b.classList.toggle("active", b.dataset.lang===lang); });
  /* 待機中の用件バッジも更新 */
  var badge = document.getElementById("w-badge");
  if(badge && s.purpose[lang]) badge.textContent = s.purpose[lang];
}

/* ── CLOCK ── */
function tick(){
  var n=new Date();
  document.getElementById("clock").textContent = String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  var d=["日","月","火","水","木","金","土"];
  document.getElementById("date").textContent = n.getFullYear()+"年"+(n.getMonth()+1)+"月"+n.getDate()+"日（"+d[n.getDay()]+"）";
}
tick(); setInterval(tick,10000);

/* ── SCREEN ── */
function go(id){
  document.querySelectorAll(".screen").forEach(function(el){ el.classList.remove("active"); });
  document.getElementById("s-"+id).classList.add("active");
  screen = id;
  clearTimeout(idleTimer);
  if(id!=="idle") idleTimer = setTimeout(home, IDLE_MS);
}

function home(){
  clearTimeout(waitTimer);
  clearTimeout(idleTimer);
  var bar=document.getElementById("w-bar");
  bar.style.transition="none"; bar.style.width="0%";
  s={ company:"", purpose:{ja:"",en:"",zh:""} };
  go("idle");
}

/* ── WAIT ── */
function showWait(){
  document.getElementById("w-company").textContent = s.company;
  var badge=document.getElementById("w-badge");
  var lbl = s.purpose[lang]||s.purpose.ja;
  if(lbl){ badge.textContent=lbl; badge.style.display="block"; }
  else { badge.style.display="none"; }
  go("wait");
  sendWebhook();
  var bar=document.getElementById("w-bar");
  bar.style.transition="none"; bar.style.width="0%";
  setTimeout(function(){ bar.style.transition="width "+WAIT_MS+"ms linear"; bar.style.width="100%"; },60);
  clearTimeout(waitTimer);
  waitTimer = setTimeout(home, WAIT_MS);
}

/* ── WEBHOOK ── */
function sendWebhook(){
  var wh2 = localStorage.getItem("wh_2nd")||"";
  var whl = localStorage.getItem("wh_lux")||"";
  var wh  = (s.company==="LUX TOKYO") ? whl : wh2;
  var ts  = new Date().toLocaleString("ja-JP");
  var txt;
  if(s.company==="LUX TOKYO"){
    txt = "\uD83D\uDD14 *LUX TOKYO \u6765\u5BA2\u901A\u77E5*\n\u65E5\u6642: "+ts;
  } else {
    txt = "\uD83D\uDD14 *\u53D7\u4ED8\u901A\u77E5*\n\u53D7\u4ED8\u5148: "+s.company+"\n\u7528\u4EF6: "+(s.purpose.ja||"")+"\n\u65E5\u6642: "+ts;
  }
  log("["+ts+"] "+s.company+(s.purpose.ja?" / "+s.purpose.ja:"")+" → 送信中...");
  if(!wh){ log("⚠ Webhook未設定"); return; }
  fetch(wh,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:txt})})
    .then(function(){ log("✅ 送信成功"); })
    .catch(function(e){ log("❌ "+e.message); showToast(); });
}

/* ── EVENT DELEGATION ── */
document.addEventListener("click", function(e){
  /* 言語ボタン（data-langを持つ要素） */
  var lb = e.target.closest("[data-lang]");
  if(lb){ lang=lb.dataset.lang; applyLang(); return; }

  /* アクションボタン（data-actionを持つ要素） */
  var el = e.target.closest("[data-action]");
  if(!el) return;
  var act = el.dataset.action;

  switch(act){
    case "idle-tap":
      aTaps++;
      clearTimeout(aTapTimer);
      aTapTimer=setTimeout(function(){ aTaps=0; },2000);
      if(aTaps>=5){ aTaps=0; openAdmin(); return; }
      go("company"); break;
    case "sel-2nd":
      s.company="2nd Village"; s.purpose={ja:"",en:"",zh:""}; go("purpose"); break;
    case "sel-lux":
      s.company="LUX TOKYO"; s.purpose={ja:"",en:"",zh:""}; showWait(); break;
    case "sel-purpose":
      s.purpose={ja:el.dataset.ja, en:el.dataset.en, zh:el.dataset.zh}; showWait(); break;
    case "go-company": go("company"); break;
    case "go-home": clearTimeout(waitTimer); home(); break;
    case "admin-save":
      localStorage.setItem("wh_2nd",document.getElementById("wh-2nd").value.trim());
      localStorage.setItem("wh_lux",document.getElementById("wh-lux").value.trim());
      log("✅ 設定保存"); closeAdmin(); break;
    case "admin-close": closeAdmin(); break;
  }
});

/* アイドル画面タップ（data-actionなし領域もカバー） */
document.getElementById("s-idle").addEventListener("click", function(e){
  if(e.target.closest("[data-lang]")) return;
  aTaps++;
  clearTimeout(aTapTimer);
  aTapTimer=setTimeout(function(){ aTaps=0; },2000);
  if(aTaps>=5){ aTaps=0; openAdmin(); return; }
  go("company");
});

/* ── ADMIN ── */
function openAdmin(){
  document.getElementById("wh-2nd").value=localStorage.getItem("wh_2nd")||"";
  document.getElementById("wh-lux").value=localStorage.getItem("wh_lux")||"";
  document.getElementById("admin-modal").classList.add("open");
}
function closeAdmin(){ document.getElementById("admin-modal").classList.remove("open"); }
function log(m){ var l=document.getElementById("alog"); l.innerHTML+=m+"<br>"; l.scrollTop=l.scrollHeight; }
function showToast(){ var el=document.getElementById("toast"); el.textContent=tr("net_err"); el.classList.add("show"); setTimeout(function(){ el.classList.remove("show"); },4000); }

/* ── INIT ── */
applyLang();

})();
</script>
</body>
</html>
